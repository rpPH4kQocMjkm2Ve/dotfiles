    "hypridle",
    "hyprpaper",
    "hyprpolkitagent",
    "hyprsunset",
    "waybar",
    "mpd",
    "ssh-agent",
    "keys-vault",
    "ssh-add",
    "nextcloud",
    "{{ if .ocr }}transformers_ocr{{ end }}",
]
