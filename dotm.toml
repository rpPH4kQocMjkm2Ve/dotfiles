dest = "~"

# ─── Prompts ───

[prompts]
nvidia       = { type = "bool", question = "NVIDIA GPU" }
amd_cpu      = { type = "bool", question = "AMD CPU (for temp sensors)" }
laptop       = { type = "bool", question = "Laptop (battery, backlight, compact fonts)" }
tablet       = { type = "bool", question = "Drawing tablet (OpenTabletDriver)" }
ocr          = { type = "bool", question = "OCR (transformers_ocr)" }
goldendict   = { type = "bool", question = "GoldenDict" }
subs2srs     = { type = "bool", question = "subs2srs" }
sparrow      = { type = "bool", question = "sparrow-wallet" }
portproton   = { type = "bool", question = "PortProton" }
virt_manager = { type = "bool", question = "QEMU / virt-manager" }

# ─── Symlinks ───

[symlinks]
".local/bin/imv-dir"  = "{{ .homeDir }}/.local/bin/imv"
".local/bin/sing-box" = "{{ .homeDir }}/sing-box/sing-box"
".config/systemd/user/com.nextcloudgmbh.Nextcloud.service" = "/dev/null"

# ─── Scripts ───

[[scripts]]
path     = "scripts/bootstrap.sh.tmpl"
template = true
trigger  = "on_change"

# ─── Managers ───

[managers.pacman]
check   = "pacman -Q {{.Name}}"
install = "sudo pacman -S --needed {{.Name}}"
remove  = "sudo pacman -Rns {{.Name}}"

[managers.aur]
check   = "pacman -Q {{.Name}}"
install = "aur sync --no-view -n {{.Name}} && sudo pacman -S --needed {{.Name}}"
remove  = "sudo pacman -Rns {{.Name}}"

[managers.flatpak]
check   = "flatpak info '{{.Name}}' >/dev/null 2>&1"
install = "flatpak install -y --noninteractive {{.Name}}"
remove  = "flatpak uninstall -y --noninteractive {{.Name}}"

[managers.gitpkg]
check   = "gitpkg list 2>/dev/null | grep -q '^{{.Name}} '"
install = "sudo gitpkg install {{.Name}}"
remove  = "sudo gitpkg remove {{.Name}}"

[managers.npm]
check   = "pkg={{.Name}}; pkg=${pkg%@*}; test -d $(npm root -g)/$pkg"
install = "npm install -g {{.Name}}"
remove  = "npm uninstall -g {{.Name}}"

[managers.systemd]
check   = "systemctl is-enabled {{.Name}}"
enable  = "sudo systemctl enable {{.Name}}"
disable = "sudo systemctl disable {{.Name}}"

[managers.systemd-user]
check   = "systemctl --user is-enabled {{.Name}}"
enable  = "systemctl --user enable {{.Name}}"
disable = "systemctl --user disable {{.Name}}"

