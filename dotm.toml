    "verify-lib",
    "gitpkg",
    "atomic-upgrade",
    "bwrap-common",
    "hardened_malloc",
    "fetch",
    "btrfs-file-history",
    "{{ if .subs2srs }}subs2srs{{ end }}",
    "{{ if .ocr }}transformers_ocr{{ end }}",
]

# ─── npm global packages ───

[npm]
